<!DOCTYPE html>
<html lang="en">
<head>

    <!-- For the beginning of this, I made a crappy grid. Then I asked Co-pilot: "Can you create a 5 column, 2 row grid and include my h1 header and my text?"
    It created the basic bones of this website -->


    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.typekit.net/glu8hgg.css">
    <title>TheCafeExperience</title>
    <style>
      :root{
        --gap:16px;
        --pad:80px;
        --font: novecento-sans-wide, sans-serif;
      }
      body{
        margin:0;
        font-family: "novecento-sans-wide", sans-serif;
        font-weight: 700;
        font-style: normal;
        background:#fff;
        color:#111;
      }
      .grid {
        display:grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(2, auto);
        gap: var(--gap);
        align-items:start;
      }
      .cell {
        padding:12px;
        background:transparent;
      }
      /* place header prominently in the first row spanning two columns */
      #cell1 { grid-column: 1 / span 3; grid-row: 1; }
      /* place text in the first row, third column <---- Changed this to put in the 2nd row under the title */
      #cell2 { grid-column: 1 / span 3; grid-row: 2; }

       #cell3 { grid-column: 5; grid-row: 2; } /*<----- For the google from so the user has access directly from the page */
 
      
      /* keep empty cells visible for layout debugging (optional) */
      .cell.empty { background:transparent; }
      h1 { margin:0; font-size:5rem; color:#252422; }
      p { margin:0; font-size:1rem; color:#333; }
      img { max-width:100%; height:auto; display:block; }
    </style>
</head>
<body>

  <div class="grid" id="grid1">
    <div class="cell" id="cell1">
      <h1>Cafe Crew</h1>
    </div>

    <div class="cell" id="cell2">
      <p>Share your experience and habits in our cafe!</p>
    </div>

    <div class="cell" id="cell3">
      <img src="images/cripplingdefeat.png" alt="Cafe image">
    </div>

    <!-- fill remaining grid slots (empty) -->
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
  </div>

</body>
</html>
