<!DOCTYPE html>
<html lang="en">
<head>
    
    <!-- For the beginning of this, I made a crappy grid. Then I asked Co-pilot: "Can you create a 5 column, 2 row grid and include my h1 header and my text?" -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://use.typekit.net/glu8hgg.css">
    
    <!-- Form / button color -->
    <style>
      /* Make form buttons use the requested color */
      button,
      input[type="submit"],
      .form-button,
      .google-form-button {
        background-color: #C44536 !important;
        color: #ffffff !important;
        border: none;
        border-radius: 4px;
        padding: 8px 12px;
        cursor: pointer;
      }

      button:hover,
      input[type="submit"]:hover,
      .form-button:hover,
      .google-form-button:hover {
        opacity: 0.95;
      }

      /* If the form is added as a link, provide a matching link style */
      a.google-form-link {
        background-color: #C44536;
        color: #ffffff;
        padding: 8px 12px;
        border-radius: 4px;
        display: inline-block;
        text-decoration: none;
      }
    </style>

    <title>TheCafeExperience</title>
    <style>
      :root{
        --gap:16px;
        --pad:80px;
        --font: novecento-sans-wide, sans-serif;
      }
      body{
        margin:0;
         /* font-family: "indivisible", sans-serif;
        font-weight: 500;
        font-style: normal; */
          font-family: "Alan Sans", sans-serif;
        font-optical-sizing: auto;
        font-weight: 700;
        font-style: normal;
        color:#111;
      }
      /* ensure card body text uses the intended font and weight */
      #responsesContainer article,
      #responsesContainer article * {
        font-family: "Alan Sans", sans-serif;
        font-weight: 400;
        color: #252422;
      }
      h1{
        /* font-family: "novecento-sans-wide", sans-serif;
        font-weight: 700;
        font-style: normal; */
        font-family: "hello-bloomie-script", sans-serif;
        font-weight: 400;
        font-style: normal;
        font-size: 128px;
      }

      .grid {
        display:grid;
        grid-template-columns: repeat(5, 1fr);
        grid-template-rows: repeat(2, auto);
        align-items:start;
      }
      .cell {
        padding:20px;
        background:transparent;
      }
      /* place header prominently in the first row spanning two columns */
      #cell1 { grid-column: 1 / span 3; grid-row: 1; padding-left:50px; }
      /* place text in the first row, third column <---- Changed this to put in the 2nd row under the title */
      #cell2 { grid-column: 1 / span 3; grid-row: 2; padding-left:50px;}

       #cell3 { grid-column: 5; grid-row: 2; } /*<----- For the google from so the user has access directly from the page */
 
      
      /* keep empty cells visible for layout debugging (optional) */
      .cell.empty { background:transparent; }
      /* Adjusting the styling of header and sub header */
      h1 { margin:0; font-size:8rem; color:#252422; }
      p { margin:0; font-size:1.5rem; color:#252422; }
      button { background-color:#4A7856; color:white; padding:10px; border-radius:5px; font-size:1.5rem;}
      button:hover { background-color:#345830; color:#EDEBD7;}
    
    </style>
</head>
<body>

  <div class="grid" id="grid1">
    <div class="cell" id="cell1">
      <h1>Coffee Log</h1>
    </div>

    <div class="cell" id="cell2">
      <p>Join the journal! Add your personal cafe experience and watch it appear at the bottom!</p>
    </div>
<!-- Adding the google form: THis lets users interact with the forum without having to do anything extra.  -->
    <div class="cell" id="cell3">
       <button><a href="https://docs.google.com/forms/d/e/1FAIpQLScnonZLnKX_cHytdFwhfirCAWNx6p44uqoMBpI0jIznoyjMKw/viewform?usp=dialog" style="text-decoration: none;" target="_blank" class="button">Add Your Experience</a></button>
    </div>

    <!-- fill remaining grid slots (empty) -->
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
    <div class="cell empty"></div>
  </div>
 <script src="script.js"></script><!-- <--------Had to add the script.js connector to the HTML file -->
</body>
</html>
